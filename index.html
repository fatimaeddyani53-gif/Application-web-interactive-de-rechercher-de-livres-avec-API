<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📚 Book Search Pro</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      cursor: pointer;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #results {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .book {
      background: white;
      margin: 15px;
      padding: 10px;
      width: 180px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
      transition: 0.3s;
      cursor: pointer;
    }

    .book:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .like {
      background: red;
      margin-top: 5px;
    }

    /* Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    #popup-content {
      background: white;
      width: 60%;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
    }

    #close {
      float: right;
      cursor: pointer;
      color: red;
    }
  </style>
</head>

<body>

  <h1>📚 Book Search Pro</h1>

  <input type="text" id="search" placeholder="Enter book name">
  <button id="btn">Search</button>

  <div id="results"></div>

  <!-- Popup -->
  <div id="popup">
    <div id="popup-content">
      <span id="close">❌ Close</span>
      <div id="details"></div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
